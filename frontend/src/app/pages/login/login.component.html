<div class="flex justify-center items-center min-h-screen bg-gray-100">

  <div class="w-96 p-6 bg-white rounded-lg shadow-lg">

    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>

    <input [(ngModel)]="formData.email"
      placeholder="Email"
      class="w-full mb-3 p-2 border rounded focus:outline-red-400" />

    <input [(ngModel)]="formData.password"
      type="password"
      placeholder="Password"
      class="w-full mb-3 p-2 border rounded focus:outline-red-400" />

    <button
      (click)="login()"
      class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600"
    >
      Login
    </button>

  </div>
</div>
